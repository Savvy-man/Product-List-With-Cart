<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
  <title>Frontend Mentor | Product list with cart</title>
 
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <div>
      <h1>Desserts</h1>
      <div id="public" class="edit44"></div>
    </div>

    <div id="cart">
      <h2>
        <span style="color: rgb(220, 71, 9)">My Cart</span>
        (<span id="cartItemCount">0</span>)
      </h2>

      <div id="cart-items-list">
      </div>

      <div class="totals">
        <div class="totals-row">
          <span class="muted">Order Total</span>
          <strong id="cartTotal">$0.00</strong>
        </div>
        <button id="checkoutBtn" class="order-btn" type="button" disabled>Confirm Order</button>
      </div>
    </div>

    <div class="attribution">
      Challenge by <a href="https://frontendmentor.io" target="_blank">Frontend Mentor</a>.
    </div>
  </main>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h2>Order Confirmed</h2>
      <p style="color: #6b7280; font-size: 14px; margin-bottom: 20px;">We hope you enjoy your desserts!</p>
      <div id="modalItems" class="modal-items"></div>
      <div class="modal-total">
        <span>Order Total</span>
        <span id="modalTotal">$0.00</span>
      </div>
      <button class="btn-modal-close" type="button" id="modalNewOrder">Start New Order</button>
    </div>
  </div>
  <script src="java.js"></script>
</body>

</html>
